<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FashionHub - Admin</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/admin.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body>

    <div class="container-fluid">

        <div class="row">

            <!-- SIDEBAR -->

            <div class="col-12 col-md-3 col-lg-2 sidebar p-4 shadow">

                <h2 class="logo text-white mb-5">
                    FashionHub
                </h2>

                <div class="menu">

                    <a href="#" class="active">

                        <i class="fa-solid fa-shirt"></i>
                        Products

                    </a>

                    <a href="index.html">

                        <i class="fa-solid fa-shop"></i>
                        Back to Shop

                    </a>

                </div>

            </div>

            <!-- MAIN -->

            <div class="col-12 col-md-9 col-lg-10 p-4">

                <!-- NAVBAR -->

                <nav class="navbar bg-white rounded-4 shadow-sm p-3 mb-4">

                    <div class="container-fluid d-flex justify-content-between">

                        <h4 class="fw-bold">
                            Product Management
                        </h4>

                        <div class="d-flex align-items-center gap-2">

                            <span>
                                Admin
                            </span>

                            <div class="admin-avatar">

                                <i class="fa-solid fa-user"></i>

                            </div>

                        </div>

                    </div>

                </nav>

                <!-- LOADING -->

                <div id="loading" class="text-center my-3 d-none">

                    <div class="spinner-border text-dark"></div>

                </div>

                <!-- PRODUCT TABLE -->

                <div class="card shadow-sm border-0 rounded-4">

                    <div class="card-body">

                        <div class="d-flex justify-content-between align-items-center mb-4">

                            <h4 class="fw-bold mb-0">
                                Product List
                            </h4>

                            <button class="btn btn-dark rounded-pill px-4" data-bs-toggle="modal"
                                data-bs-target="#productModal">

                                <i class="fa fa-plus me-2"></i>
                                Add Product

                            </button>

                        </div>

                        <div class="table-responsive">

                            <table class="table align-middle">

                                <thead class="table-dark">

                                    <tr>

                                        <th>Image</th>
                                        <th>Name</th>
                                        <th>Price</th>
                                        <th>Category</th>
                                        <th>Stock</th>
                                        <th>Created</th>
                                        <th>Action</th>

                                    </tr>

                                </thead>

                                <tbody id="productList"></tbody>

                            </table>

                        </div>

                        <!-- PAGINATION -->

                        <nav class="mt-4">

                            <ul class="pagination justify-content-center" id="pagination">

                            </ul>

                        </nav>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- PRODUCT MODAL -->

    <div class="modal fade" id="productModal" tabindex="-1">

        <div class="modal-dialog modal-lg modal-dialog-centered">

            <div class="modal-content border-0 rounded-4">

                <!-- HEADER -->

                <div class="modal-header border-0 pb-0">

                    <h4 class="fw-bold" id="modalTitle">

                        Add Product

                    </h4>

                    <button class="btn-close" data-bs-dismiss="modal">

                    </button>

                </div>

                <!-- BODY -->

                <div class="modal-body pt-2">

                    <div class="row g-3">

                        <!-- NAME -->

                        <div class="col-12">

                            <label class="form-label fw-semibold">
                                Product Name
                            </label>

                            <input id="nameInput" class="form-control" placeholder="Enter product name">

                            <small id="nameError" class="text-danger"></small>

                        </div>

                        <!-- PRICE -->

                        <div class="col-md-6">

                            <label class="form-label fw-semibold">
                                Price
                            </label>

                            <input id="priceInput" type="number" class="form-control" placeholder="Enter price">

                            <small id="priceError" class="text-danger"></small>

                        </div>

                        <!-- STOCK -->

                        <div class="col-md-6">

                            <label class="form-label fw-semibold">
                                Stock
                            </label>

                            <input id="stockInput" type="number" class="form-control" placeholder="Enter stock">

                            <small id="stockError" class="text-danger"></small>

                        </div>

                        <!-- CATEGORY -->

                        <div class="col-md-6">

                            <label class="form-label fw-semibold">
                                Category
                            </label>

                            <select id="categoryInput" class="form-select">

                            </select>

                            <small id="categoryError" class="text-danger"></small>

                        </div>

                        <!-- IMAGE -->

                        <div class="col-md-6">

                            <label class="form-label fw-semibold">
                                Image URL
                            </label>

                            <input id="imageInput" class="form-control" placeholder="Enter image URL">

                            <small id="imageError" class="text-danger"></small>

                        </div>

                        <!-- DESCRIPTION -->

                        <div class="col-12">

                            <label class="form-label fw-semibold">
                                Description
                            </label>

                            <textarea id="descriptionInput" class="form-control" rows="4"
                                placeholder="Enter product description"></textarea>

                            <small id="descriptionError" class="text-danger"></small>

                        </div>

                    </div>

                </div>

                <!-- FOOTER -->

                <div class="modal-footer border-0 pt-0">

                    <button class="btn btn-light px-4 rounded-pill" data-bs-dismiss="modal">

                        Cancel

                    </button>

                    <button id="saveBtn" class="btn btn-dark px-4 rounded-pill">

                        Save Product

                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- DELETE MODAL -->

    <div class="modal fade" id="deleteModal" tabindex="-1">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content rounded-4 border-0">

                <div class="modal-body text-center p-5">

                    <div class="mb-4">

                        <i class="fa-solid fa-trash text-danger fs-1"></i>

                    </div>

                    <h4 class="fw-bold mb-3">
                        Delete Product?
                    </h4>

                    <p class="text-muted">
                        This action cannot be undone.
                    </p>

                    <div class="d-flex justify-content-center gap-3 mt-4">

                        <button class="btn btn-light px-4 rounded-pill" data-bs-dismiss="modal">

                            Cancel

                        </button>

                        <button class="btn btn-danger px-4 rounded-pill" id="confirmDeleteBtn">

                            Delete

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- TOAST -->

    <div class="toast-container position-fixed bottom-0 end-0 p-3">

        <div id="successToast" class="toast text-bg-success border-0">

            <div class="toast-body">

                Action success!

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->

    <script type="module" src="js/admin.js"></script>

</body>

</html>
