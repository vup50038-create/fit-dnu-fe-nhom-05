<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fashion Hub</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/index.css">

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg py-3 shadow-sm">

        <div class="container">

            <a class="navbar-brand" href="#">
                FashionHub
            </a>

            <button class="navbar-toggler bg-white"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto gap-lg-3">

                    <li class="nav-item">
                        <a class="nav-link" href="#" title="0364697180">
                            Contact
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- Main -->

    <div class="container py-5">

        <!-- Header -->

        <div class="mb-5">

            <h1 class="page-title mb-3">
                Explore Fashion Collection
            </h1>

            <p class="page-subtitle">
                Discover trending fashion products with modern style.
            </p>

        </div>

        <!-- Search + Category -->

        <div class="row align-items-center g-4 mb-5">

            <!-- Search -->

            <div class="col-12 col-lg-4">

                <input type="text"
                    class="form-control search-box"
                    placeholder="Search product..."
                    id="searchInput">

            </div>

            <!-- Categories -->

            <div class="col-12 col-lg-8">

                <div class="d-flex flex-wrap gap-3"
                    id="categoryList">

                </div>

            </div>

        </div>

        <!-- Product List -->

        <div class="row g-4" id="productList"></div>

        <!-- Pagination -->

        <div class="d-flex justify-content-center mt-5">

            <ul class="pagination" id="pagination"></ul>

        </div>

    </div>

    <!-- Product Modal -->

    <div class="modal fade" id="productModal">

        <div class="modal-dialog modal-lg modal-dialog-centered">

            <div class="modal-content p-3">

                <div class="modal-body">

                    <div class="row g-4 align-items-center">

                        <div class="col-12 col-lg-6">

                            <img id="modalImage"
                                class="modal-product-img">

                        </div>

                        <div class="col-12 col-lg-6">

                            <span class="badge-category"
                                id="modalCategory">

                            </span>

                            <h2 class="fw-bold mt-3"
                                id="modalName">

                            </h2>

                            <h2 class="price my-4"
                                id="modalPrice">

                            </h2>

                            <p class="text-muted"
                                id="modalDescription">

                            </p>

                            <button class="btn-dark-custom mt-3"
                                data-bs-dismiss="modal">

                                Close

                            </button>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Main JS -->

    <script type="module" src="js/main.js"></script>

</body>

</html>
